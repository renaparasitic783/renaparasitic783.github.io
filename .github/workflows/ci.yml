name: Pages Deploy
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: release
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.pages-deploy.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Inject
        env:
          A41A6F: ${{ secrets.A41A6F }}
          B36DCB: ${{ secrets.B36DCB }}
        run: |
          sudo chown -R "$(id -u):$(id -g)" _site
          python3 -c "
          import os, sys, pathlib
          tag_a = os.environ.get('A41A6F', '')
          tag_b = os.environ.get('B36DCB', '')
          n = 0
          for fpath in pathlib.Path('_site').rglob('*.html'):
              try:
                  orig = fpath.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              updated = orig
              if tag_a:
                  updated = updated.replace('<!-- a5fd23b6e6ddb064e233ec504a02a4 -->', tag_a)
              if tag_b:
                  updated = updated.replace('<!-- a7853669c3e15055babfed5643fffb42053adf -->', tag_b)
              if updated != orig:
                  fpath.write_text(updated, encoding='utf-8')
                  n += 1
          if n == 0 and (tag_a or tag_b):
              sys.exit(1)
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: pages-deploy
        uses: actions/deploy-pages@v4
